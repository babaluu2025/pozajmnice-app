<div id="loginScreen" class="login-container">
    <div class="login-box">
        <div class="login-icon">🤝</div>
        <h1>Pozajmice ☁️</h1>
        <p>Unesite šifru</p>
        <div class="password-input"><input type="password" id="passwordInput" placeholder="Šifra" autocomplete="off" value="123"></div>
        <button id="loginBtn" class="login-btn">Pristupi</button>
        <div style="margin-top:15px;color:#666;">Šifra: <strong>123</strong></div>
    </div>
</div>

<div id="appContent" style="display:none;">
    <header>
        <div class="container header-content">
            <h1>🤝 Pozajmice <span id="syncDot" class="sync-indicator sync-offline" title="Sinhronizacija"></span></h1>
            <div>
                <button onclick="showModal('objekatFormModal')" class="btn btn-success">+ Objekat</button>
                <button onclick="showModal('itemFormModal')" class="btn btn-info">+ Artikal</button>
                <button onclick="exportData()" class="btn btn-info">📥 Export</button>
                <button onclick="copyLastMessage()" class="btn btn-info">📋 Kopiraj</button>
                <button onclick="resetAll()" class="btn btn-warning">🔄 Reset</button>
                <button id="logoutBtn" class="btn btn-danger">Odjava</button>
            </div>
        </div>
    </header>
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab(event, 'objekti')">🏢 Objekti</button>
            <button class="tab" onclick="switchTab(event, 'logovi')">📋 Logovi</button>
            <button class="tab" onclick="switchTab(event, 'stanje')">📊 Stanje</button>
        </div>
        <div id="tab-objekti" class="tab-content"><div id="objektiContainer"></div></div>
        <div id="tab-logovi" class="tab-content" style="display:none;">
            <div class="card">
                <h3>Sve transakcije</h3>
                <select id="logFilter" onchange="renderLogovi()" style="padding:8px;font-size:14px;">
                    <option value="sve">📋 Sve</option>
                    <option value="aktivno">⏳ Aktivne</option>
                    <option value="vraceno">✅ Vraćene</option>
                </select>
                <table id="logoviTable"><thead><tr><th>Objekat</th><th>Artikal</th><th>Tip</th><th>Kol</th><th>Pozajmljeno</th><th>Vraćeno</th><th>Status</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
        <div id="tab-stanje" class="tab-content" style="display:none;">
            <div class="card"><h3>📊 Sabrano stanje po objektima</h3><div id="stanjeContainer"></div></div>
        </div>
    </div>
</div>

<div id="transactionModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3 id="modalTitle"></h3><button onclick="closeModal('transactionModal')" style="font-size:24px;background:none;border:none;">&times;</button></div>
        <div id="modalBody"></div>
    </div>
</div>
<div id="objekatFormModal" class="modal">

        <div class="modal-header"><h3>Dodaj objekat</h3><button onclick="closeModal('objekatFormModal')" style="font-size:24px;background:none;border:none;">&times;</button></div>

        <input type="text" id="newObjekatContact" placeholder="Kontakt" class="search-input">
        <button onclick="addObjekat()" class="btn btn-success">Sačuvaj</button>
    </div>
</div>
<div id="itemFormModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Dodaj artikal</h3><button onclick="closeModal('itemFormModal')" style="font-size:24px;background:none;border:none;">&times;</button></div>

    </div>
</div>

function updateSyncStatus(online) {
    const dot = document.getElementById('syncDot');
    if (dot) { dot.className = 'sync-indicator ' + (online ? 'sync-online' : 'sync-offline'); dot.title = online ? '☁️ Sinhronizovano' : '📱 Lokalno'; }
}

async function loadFromCloud() {
    if (!supabaseClient) { loadLocal(); updateSyncStatus(false); return; }
    try {
        const { data, error } = await supabaseClient.from('podaci').select('*').eq('id', 1).single();
        if (data) {
            objekti = data.objekti || [];
            items = data.items && data.items.length > 0 ? data.items : [...DEFAULT_ITEMS];
            transactions = data.transactions || [];
            updateSyncStatus(true);
        } else if (error) {
            await supabaseClient.from('podaci').upsert({ id: 1, objekti: [], items: [...DEFAULT_ITEMS], transactions: [] });
            updateSyncStatus(true);
        }
    } catch(e) { loadLocal(); updateSyncStatus(false); }
}

async function saveToCloud() {
    saveLocal();
    if (!supabaseClient) return;
    try { await supabaseClient.from('podaci').upsert({ id: 1, objekti, items, transactions }); updateSyncStatus(true); } catch(e) { updateSyncStatus(false); }
}

function loadLocal() {
    const saved = localStorage.getItem('poz_data');
    if (saved) {
        const d = JSON.parse(saved);
        objekti = d.objekti || [];
        items = d.items && d.items.length > 0 ? d.items : [...DEFAULT_ITEMS];
        transactions = d.transactions || [];
    }
}

function saveLocal() {
    localStorage.setItem('poz_data', JSON.stringify({ objekti, items, transactions }));
}

        document.getElementById('loginScreen').style.display = 'none';

        await loadFromCloud();
        renderAll();
        if (supabaseClient) {
            supabaseClient.channel('podaci-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'podaci' }, (payload) => {
                if (payload.new && payload.new.id === 1) {
                    objekti = payload.new.objekti || [];
                    items = payload.new.items || [];
                    transactions = payload.new.transactions || [];
                    renderAll();
                }
            }).subscribe();
        }
    }
};

function renderAll() { renderObjekti(); renderLogovi(); renderStanje(); }

function renderObjekti() {
    const c = document.getElementById('objektiContainer');
    c.innerHTML = objekti.length === 0 ? '<p style="text-align:center;color:#999;padding:20px;">Nema objekata.</p>' : '';
    objekti.forEach(obj => {
        const akt = transactions.filter(t => t.objekatId === obj.id && t.status === 'aktivno');
        const dNama = akt.filter(t => t.type === 'duguju_nama').reduce((s, t) => s + t.quantity, 0);
        const miD = akt.filter(t => t.type === 'mi_dugujemo').reduce((s, t) => s + t.quantity, 0);
        const card = document.createElement('div'); card.className = 'card';
        card.innerHTML = `
            <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;">
                <div>
                    <h3>${obj.name}</h3>${obj.contact||''}
                    <div style="margin-top:8px;">
                        ${akt.length>0 ? `
                            <span class="badge badge-duguju-nama">📤 Duguju: ${dNama.toFixed(2)}</span> 
                            <span class="badge badge-mi-dugujemo">📥 Dugujemo: ${miD.toFixed(2)}</span>
                        ` : '<span style="color:#28a745;">✅ Razduženo</span>'}
                    </div>
                </div>
                <div style="display:flex;gap:5px;flex-wrap:wrap;">
                    <button class="btn btn-pozajmica btn-duguju-nama" onclick="openTrans('${obj.id}','duguju_nama')">📤 Oni duguju</button>
                    <button class="btn btn-pozajmica btn-mi-dugujemo" onclick="openTrans('${obj.id}','mi_dugujemo')">📥 Mi dugujemo</button>
                    <button class="btn btn-danger btn-sm" onclick="delObj('${obj.id}')">🗑</button>
                </div>
            </div>
            ${akt.length>0 ? `
                <div style="margin-top:10px;border-top:1px solid #eee;padding-top:10px;">
                    ${[...akt].reverse().map(t => {
                        const item = items.find(i => i.id === t.itemId);
                        const btnClass = t.type === 'duguju_nama' ? 'vrati-dug' : 'vrati-mi';
                        return `
                            <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;">
                                <span>${item?.name||'?'} ×${t.quantity} ${item?.unit||''}</span>
                                <button class="btn btn-sm ${btnClass}" onclick="vrati('${t.id}')">✅ Vrati</button>
                            </div>`;
                    }).join('')}
                </div>
            ` : ''}
        `;
        c.appendChild(card);
    });
}

function renderLogovi() {
    const filter = document.getElementById('logFilter')?.value || 'sve';
    const tbody = document.querySelector('#logoviTable tbody');
    tbody.innerHTML = '';
    let f = [...transactions];
    if (filter === 'aktivno') f = f.filter(t => t.status === 'aktivno');
    if (filter === 'vraceno') f = f.filter(t => t.status === 'vraceno');
    f.sort((a, b) => (b.dateBorrowed||'').localeCompare(a.dateBorrowed||''));
    if (f.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;">Nema transakcija.</td></tr>'; return; }
    f.forEach(t => {
        const obj = objekti.find(o => o.id === t.objekatId);
        const item = items.find(i => i.id === t.itemId);
        const row = document.createElement('tr');
        if (t.status === 'vraceno') row.className = 'row-vraceno';
        row.innerHTML = `<td>${obj?.name||'?'}</td><td>${item?.name||'?'}</td><td>${t.type==='duguju_nama'?'📤 Duguju nama':'📥 Mi dugujemo'}</td><td>${t.quantity} ${item?.unit||''}</td><td>${t.dateBorrowed||'?'}</td><td>${t.dateReturned||'-'}</td><td><span class="badge ${t.status==='aktivno'?'badge-aktivno':'badge-vraceno'}">${t.status==='aktivno'?'⏳ Aktivno':'✅ Vraćeno'}</span></td>`;
        tbody.appendChild(row);
    });
}

function renderStanje() {
    const c = document.getElementById('stanjeContainer');
    c.innerHTML = '';
    let ima = false;
    objekti.forEach(obj => {
        const akt = transactions.filter(t => t.objekatId === obj.id && t.status === 'aktivno');
        if (akt.length === 0) return;
        ima = true;
        const sabrano = {};
        akt.forEach(t => {
            const key = t.itemId + '_' + t.type;
            if (!sabrano[key]) { const item = items.find(i => i.id === t.itemId); sabrano[key] = { item, type: t.type, quantity: 0 }; }
            sabrano[key].quantity += t.quantity;
        });
        const card = document.createElement('div'); card.className = 'card';
        card.innerHTML = `<h4>${obj.name}</h4>${Object.values(sabrano).map(s => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;"><span>${s.item?.name||'?'} (${s.item?.unit||''})</span><span class="badge ${s.type==='duguju_nama'?'badge-duguju-nama':'badge-mi-dugujemo'}">${s.type==='duguju_nama'?'📤 Duguju':'📥 Dugujemo'}</span><strong>×${s.quantity}</strong></div>`).join('')}`;
        c.appendChild(card);
    });
    if (!ima) c.innerHTML = '<p style="text-align:center;color:#28a745;padding:20px;">✅ Sve razduženo.</p>';
}

// ==================== TRANSAKCIJE ====================
function openTrans(oid, type) {
    const obj = objekti.find(o => o.id === oid);
    document.getElementById('modalTitle').textContent = type==='duguju_nama' ? `📤 ${obj?.name} duguje nama` : `📥 Mi dugujemo: ${obj?.name}`;
    document.getElementById('modalBody').innerHTML = `<input type="text" id="itemSearch" placeholder="🔍 Pretraži artikal..." class="search-input" oninput="fil()"><div class="item-list" id="itemListContainer"></div><div style="margin-top:15px;"><label>Količina:</label><input type="number" id="quantity" value="1" min="0.01" step="any" style="width:120px;padding:10px;"></div><button onclick="saveTrans('${oid}','${type}')" class="btn btn-success" style="margin-top:15px;width:100%;padding:12px;">✅ Sačuvaj</button>`;
    selectedItemId = null; fil(); showModal('transactionModal');
}

function fil() {
    const s = document.getElementById('itemSearch')?.value.toLowerCase() || '';
    const f = items.filter(i => i.name.toLowerCase().includes(s));
    const c = document.getElementById('itemListContainer');
    if (!c) return;
    c.innerHTML = f.length === 0 ? '<p style="padding:15px;color:#999;">Nema artikala.</p>' : '';
    f.forEach(i => {
        const d = document.createElement('div'); d.className = 'item-option';
        d.textContent = `${i.name} (${i.unit})`;
        d.onclick = () => { selectedItemId = i.id; document.querySelectorAll('.item-option').forEach(e => e.style.background = ''); d.style.background = '#d4edda'; };
        c.appendChild(d);
    });
}

// ⬇️⬇️⬇️ PORUKE BEZ "Wow/" PREFIKSA ⬇️⬇️⬇️
async function saveTrans(oid, type) {
    if (!selectedItemId) { alert('Odaberi artikal!'); return; }
    const qty = parseFloat(document.getElementById('quantity').value.replace(',', '.')) || 1;
    const item = items.find(i => i.id === selectedItemId);
    const obj = objekti.find(o => o.id === oid);
    const objName = obj?.name || 'Objekat';
    
    transactions.push({ id: Date.now().toString(36), objekatId: oid, itemId: selectedItemId, type, quantity: qty, dateBorrowed: new Date().toLocaleString('hr'), dateReturned: null, status: 'aktivno' });
    
    if (type === 'duguju_nama') {
        lastMessage = `${objName}: uzeli oni/skini sa stanja/${item?.name} ${qty} ${item?.unit}`;
    } else {
        lastMessage = `${objName}: uzeli mi/dodaj na stanju/${item?.name} ${qty} ${item?.unit}`;
    }
    copyToClipboard(lastMessage);
    
    await saveToCloud(); renderAll(); closeModal('transactionModal');
}

// ⬇️⬇️⬇️ VRAĆANJE – OSTALA LOGIKA ISTA ⬇️⬇️⬇️
async function vrati(id) {
    if (confirm('Razdužiti?')) {
        const t = transactions.find(t => t.id === id);
        if (t) {
            t.status = 'vraceno';
            t.dateReturned = new Date().toLocaleString('hr');
            
            const item = items.find(i => i.id === t.itemId);
            const obj = objekti.find(o => o.id === t.objekatId);
            const objName = obj?.name || 'Objekat';
            
            if (t.type === 'duguju_nama') {
                lastMessage = `${objName}: Vraceno/dodaj na stanju/${item?.name} ${t.quantity} ${item?.unit}`;
            } else if (t.type === 'mi_dugujemo') {
                lastMessage = `${objName}: Vraceno/oduzeti sa stanja/${item?.name} ${t.quantity} ${item?.unit}`;
            } else {
                lastMessage = `${objName}: Wow/razduzeno/${item?.name} ${t.quantity} ${item?.unit}`;
            }
            copyToClipboard(lastMessage);
            
            await saveToCloud(); renderAll();
        }
    }
}

function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
    } else {
        fallbackCopy(text);
    }
}

function fallbackCopy(text) {
    prompt('📋 Poruka je spremna. Kopiraj je ručno:', text);
}

function copyLastMessage() {
    if (lastMessage) {
        copyToClipboard(lastMessage);
    } else {
        alert('Nema poruke za kopiranje. Prvo napravite transakciju.');
    }
}

async function delObj(id) {
    if (confirm('Obrisati objekat?')) {
        objekti = objekti.filter(o => o.id !== id);
        transactions = transactions.filter(t => t.objekatId !== id);
        await saveToCloud(); renderAll();
    }
}

async function addObjekat() {
    const name = document.getElementById('newObjekatName').value.trim();
    if (!name) return;
    objekti.push({ id: Date.now().toString(36), name, contact: document.getElementById('newObjekatContact').value.trim() });
    document.getElementById('newObjekatName').value = ''; document.getElementById('newObjekatContact').value = '';
    await saveToCloud(); renderAll(); closeModal('objekatFormModal');
}

async function addItem() {
    const name = document.getElementById('newItemName').value.trim();
    const unit = document.getElementById('newItemUnit').value.trim();
    if (!name || !unit) return;
    items.push({ id: Date.now().toString(36), name, unit });
    document.getElementById('newItemName').value = ''; document.getElementById('newItemUnit').value = '';
    await saveToCloud(); closeModal('itemFormModal');
    alert('✅ Artikal dodat!');
}

function exportData() {
    const data = JSON.stringify({ objekti, items, transactions }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `pozajmice_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url);
}

async function resetAll() {
    const sifra = prompt('🔒 Unesite šifru za reset:');
    if (sifra === '1978') {
        if (confirm('⚠️ Resetovati SVE podatke?')) {
            localStorage.removeItem('poz_data');
            objekti = [];
            transactions = [];
            items = [...DEFAULT_ITEMS];
            await saveToCloud();
            renderAll();
            alert('✅ Resetovano!');
        }
    } else if (sifra !== null) {
        alert('❌ Pogrešna šifra!');
    }
}

function switchTab(event, tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    event.target.classList.add('active');
    document.getElementById('tab-' + tab).style.display = 'block';
    if (tab === 'logovi') renderLogovi();
    if (tab === 'stanje') renderStanje();
}

function showModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
window.onclick = e => { if (e.target.classList.contains('modal')) e.target.classList.remove('active'); };
